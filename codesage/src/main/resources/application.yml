spring:
  application:
    name: codesage

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:codesage}
    username: ${DB_USER:codesage}
    password: ${DB_PASSWORD:codesage}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      embedding_dimensions: ${EMBEDDING_DIMENSIONS:3072}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: codesage-platform
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

codesage:
  github:
    api-base-url: https://api.github.com
    webhook-secret-header: X-Hub-Signature-256
    delivery-id-header: X-GitHub-Delivery
    event-header: X-GitHub-Event
  kafka:
    topics:
      repository-index-requested: codesage.repository.index.requested
      repository-index-completed: codesage.repository.index.completed
      embedding-generation-requested: codesage.embedding.generation.requested
      review-requested: codesage.review.requested
      review-completed: codesage.review.completed
      audit-events: codesage.audit.events
  redis:
    webhook-dedup-ttl: PT24H
    rate-limit-window: PT1M
    rate-limit-max-requests: 100
  security:
    api-key-header: X-API-Key
  indexing:
    workspace-path: ${INDEXING_WORKSPACE:C:/tmp/codesage/repos}
    lock-ttl: PT30M
    java-file-glob: "**/*.java"
    excluded-directories:
      - .git
      - target
      - build
      - out
      - node_modules
      - .gradle
    embedding-batch-size: 20
  embedding:
    provider: ${EMBEDDING_PROVIDER:OPENAI_COMPATIBLE}
    api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY:}}
    base-url: ${EMBEDDING_BASE_URL:https://api.openai.com/v1}
    model: ${EMBEDDING_MODEL:text-embedding-3-large}
    dimensions: ${EMBEDDING_DIMENSIONS:3072}
    timeout: PT60S
    request-dimensions: ${EMBEDDING_REQUEST_DIMENSIONS:true}
    require-api-key: ${EMBEDDING_REQUIRE_API_KEY:true}
    gemini:
      base-url: https://generativelanguage.googleapis.com/v1beta
      task-type: RETRIEVAL_DOCUMENT
    huggingface:
      base-url: https://api-inference.huggingface.co
      wait-for-model: true
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    chat-model: ${OPENAI_CHAT_MODEL:gpt-4.1}
    chat-max-tokens: 4096
    timeout: PT60S
  rag:
    default-top-k: 10
    min-similarity: 0.7
  review:
    max-methods-per-review: 20
    context-top-k: 5
    max-findings-per-method: 5
    deduplication-line-overlap-threshold: 0.5

logging:
  level:
    com.deveshparmar.codesage: INFO
    org.springframework.kafka: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
